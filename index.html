<!DOCTYPE html>
<html>
<head>
    <title>JTMK Lecturer Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f0f4f8; 
            margin: 0; 
            padding: 20px;
            color: #333;
        }
        .header { text-align: center; margin-bottom: 30px; }
        h1 { margin: 0; color: #2c3e50; font-size: 2rem; }
        
        /* Bahagian Statistik */
        .stats-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            min-width: 100px;
        }
        .stat-number { font-size: 24px; font-weight: bold; display: block; }
        .stat-label { font-size: 12px; color: #7f8c8d; text-transform: uppercase; }

        /* Grid Kad Pensyarah */
        #lecturer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); 
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .lecturer-name { 
            font-size: 1.1rem; 
            font-weight: 600; 
            margin-bottom: 15px; 
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .status-box { 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: bold; 
            color: white; 
            text-align: center;
            text-transform: uppercase;
        }

        /* Warna Dinamik */
        .bg-none { background-color: #95a5a6; }
        .bg-hadir { background-color: #2ecc71; box-shadow: 0 4px 10px rgba(46,204,113,0.3); }
        .bg-busy { background-color: #e67e22; }
        .bg-meeting { background-color: #3498db; }
        .bg-class { background-color: #9b59b6; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SMART CHAIR MONITORING SYSTEM</h1>
        <p>JTMK Politeknik Balik Pulau</p>
    </div>

    <div class="stats-container">
        <div class="stat-card"><span id="count-hadir" class="stat-number">0</span><span class="stat-label">Hadir</span></div>
        <div class="stat-card"><span id="count-busy" class="stat-number">0</span><span class="stat-label">Busy</span></div>
        <div class="stat-card"><span id="count-total" class="stat-number">0</span><span class="stat-label">Jumlah</span></div>
    </div>
    
    <div id="lecturer-grid"></div>

<script>
    const firebaseConfig = {
        databaseURL: "https://smart-chair-system-4c663-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    database.ref('PensyarahJTMK').on('value', (snapshot) => {
        const grid = document.getElementById('lecturer-grid');
        grid.innerHTML = ""; 

        let counter = { hadir: 0, busy: 0, total: 0 };

        snapshot.forEach((childSnapshot) => {
            const idKey = childSnapshot.key;
            const status = childSnapshot.val();
            const nama = idKey.replace(/_/g, ' ');

            let colorClass = "bg-none";
            if(status === "Hadir") { colorClass = "bg-hadir"; counter.hadir++; }
            else if(status === "Busy") { colorClass = "bg-busy"; counter.busy++; }
            else if(status === "Meeting") colorClass = "bg-meeting";
            else if(status === "In Class") colorClass = "bg-class";

            counter.total++;

            grid.innerHTML += `
                <div class="card">
                    <div class="lecturer-name">${nama}</div>
                    <div class="status-box ${colorClass}">${status ? status : "TIADA"}</div>
                </div>
            `;
        });

        // Update statistik di atas
        document.getElementById('count-hadir').innerText = counter.hadir;
        document.getElementById('count-busy').innerText = counter.busy;
        document.getElementById('count-total').innerText = counter.total;
    });
</script>

</body>
</html>
