<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JTMK Lecturer Dashboard & Appointment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 30px; }
        h1 { margin: 0; color: #2c3e50; font-size: 2rem; }
        p.sub-header { color: #7f8c8d; margin: 5px 0; }
        
        /* Statistics Section */
        .stats-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: white; padding: 10px 5px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; min-width: 75px; flex: 1; max-width: 110px; }
        .stat-number { font-size: 18px; font-weight: bold; display: block; }
        .stat-label { font-size: 9px; color: #7f8c8d; text-transform: uppercase; font-weight: bold; }

        /* Search Bar */
        .search-container { max-width: 500px; margin: 0 auto 30px; text-align: center; }
        #search-input { width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.1); outline: none; font-size: 16px; }

        /* Lecturer Cards */
        #lecturer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1100px; margin: 0 auto 40px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .lecturer-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        .status-box { padding: 12px; border-radius: 10px; font-weight: bold; color: white; text-transform: uppercase; letter-spacing: 1px; }

        /* Appointment Form */
        .appointment-container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .appointment-container h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-submit { width: 100%; padding: 14px; background-color: #25D366; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-submit:hover { background-color: #128C7E; }

        /* Status Colors */
        .bg-none { background-color: #95a5a6; }
        .bg-present { background-color: #2ecc71; }
        .bg-busy { background-color: #e74c3c; }
        .bg-meeting { background-color: #f1c40f; }
        .bg-leave { background-color: #3498db; }
        .bg-class { background-color: #9b59b6; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SMART CHAIR MONITORING SYSTEM</h1>
        <p class="sub-header">Department of Information & Communication Technology (JTMK)</p>
        <p class="sub-header">Politeknik Balik Pulau</p>
    </div>

    <div class="stats-container">
        <div class="stat-card"><span id="count-total" class="stat-number">0</span><span class="stat-label">Total</span></div>
        <div class="stat-card"><span id="count-present" class="stat-number">0</span><span class="stat-label" style="color:#2ecc71">Present</span></div>
        <div class="stat-card"><span id="count-busy" class="stat-number">0</span><span class="stat-label" style="color:#e74c3c">Busy</span></div>
        <div class="stat-card"><span id="count-meeting" class="stat-number">0</span><span class="stat-label" style="color:#f1c40f">Meeting</span></div>
        <div class="stat-card"><span id="count-class" class="stat-number">0</span><span class="stat-label" style="color:#9b59b6">In Class</span></div>
        <div class="stat-card"><span id="count-leave" class="stat-number">0</span><span class="stat-label" style="color:#3498db">On Leave</span></div>
        <div class="stat-card"><span id="count-none" class="stat-number">0</span><span class="stat-label" style="color:#95a5a6">None</span></div>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search lecturer name..." onkeyup="searchLecturer()">
    </div>
    
    <div id="lecturer-grid"></div>

    <div class="appointment-container">
        <h2>Book an Appointment</h2>
        <div class="form-group">
            <label>Select Lecturer:</label>
            <select id="select-lecturer">
                <option value="">-- Please Select --</option>
            </select>
        </div>
        <div class="form-group">
            <label>Your Full Name:</label>
            <input type="text" id="student-name" placeholder="Enter your full name">
        </div>
        <div class="form-group">
            <label>Your Class:</label>
            <input type="text" id="student-class" placeholder="Example: DDT5A / DDT5B">
        </div>
        <div class="form-group">
            <label>Purpose of Visit:</label>
            <textarea id="appointment-reason" rows="3" placeholder="Example: FYP Discussion / Submit assignment"></textarea>
        </div>
        <button class="btn-submit" onclick="submitAppointment()">Submit & Message via WhatsApp</button>
    </div>

    <p style="text-align: center; font-size: 12px; color: #999; margin-top: 30px;">Live Update from JTMK Office</p>

<script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        databaseURL: "https://smart-chair-system-4c663-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // --- LECTURER CONTACT LIST ---
    const lecturerContacts = {
        "NORZIMAH_BINTI_CHE_HASSAN": "601123555166", // Replace with actual numbers danial
        "NORSHAFINAZ BINTI MOHAMAD FAUZI": "60166186755", // nombor syaz
        "NUR NAIMAH BINTI MOHAMAD YUSOF": "60197551962" // no pakwan
    };

    // --- LIVE UPDATES FROM FIREBASE ---
    database.ref('PensyarahJTMK').on('value', (snapshot) => {
        const grid = document.getElementById('lecturer-grid');
        const select = document.getElementById('select-lecturer');
        grid.innerHTML = ""; 
        select.innerHTML = '<option value="">-- Please Select --</option>';

        let counter = { total: 0, present: 0, busy: 0, meeting: 0, inclass: 0, leave: 0, none: 0 };

        snapshot.forEach((childSnapshot) => {
            const idKey = childSnapshot.key;
            const status = childSnapshot.val();
            const name = idKey.replace(/_/g, ' ');

            let colorClass = "bg-none";
            let displayStatus = status ? status : "NONE";
            
            if(status === "Hadir") { 
                colorClass = "bg-present"; 
                displayStatus = "AVAILABLE";
                counter.AVAILABLE++; 
            } else if(status === "Busy") { 
                colorClass = "bg-busy"; 
                counter.busy++; 
            } else if(status === "Meeting") {
                colorClass = "bg-meeting";
                counter.meeting++;
            } else if(status === "On Leave") {
                colorClass = "bg-leave";
                counter.leave++;
            } else if(status === "In Class") {
                colorClass = "bg-class";
                counter.inclass++;
            } else {
                colorClass = "bg-none";
                displayStatus = "NONE";
                counter.none++;
            }

            counter.total++;

            grid.innerHTML += `
                <div class="card lecturer-card">
                    <div class="lecturer-name">${name}</div>
                    <div class="status-box ${colorClass}">${displayStatus}</div>
                </div>
            `;

            select.innerHTML += `<option value="${idKey}">${name}</option>`;
        });

        // Update Statistics on UI
        document.getElementById('count-total').innerText = counter.total;
        document.getElementById('count-present').innerText = counter.present;
        document.getElementById('count-busy').innerText = counter.busy;
        document.getElementById('count-meeting').innerText = counter.meeting;
        document.getElementById('count-class').innerText = counter.inclass;
        document.getElementById('count-leave').innerText = counter.leave;
        document.getElementById('count-none').innerText = counter.none;
    });

    // --- SEARCH FUNCTION ---
    function searchLecturer() {
        let input = document.getElementById('search-input').value.toLowerCase();
        let cards = document.getElementsByClassName('lecturer-card');
        for (let i = 0; i < cards.length; i++) {
            let name = cards[i].getElementsByClassName('lecturer-name')[0].innerText.toLowerCase();
            cards[i].style.display = name.includes(input) ? "" : "none";
        }
    }

    // --- SUBMIT & WHATSAPP FUNCTION ---
    function submitAppointment() {
        const lectKey = document.getElementById('select-lecturer').value;
        const student = document.getElementById('student-name').value;
        const sClass = document.getElementById('student-class').value;
        const reason = document.getElementById('appointment-reason').value;

        if (!lectKey || !student || !sClass || !reason) {
            alert("Please complete all fields.");
            return;
        }

        const appointmentData = {
            lecturer: lectKey,
            studentName: student,
            studentClass: sClass,
            purpose: reason,
            timestamp: new Date().toLocaleString()
        };

        // 1. Save to Firebase
        database.ref('Temujanji').push(appointmentData)
            .then(() => {
                // 2. Open WhatsApp if contact exists
                const phoneNumber = lecturerContacts[lectKey];

                if (phoneNumber) {
                    const lecturerName = lectKey.replace(/_/g, ' ');
                    const message = 
                        `*NEW APPOINTMENT REQUEST*\n\n` +
                        `*To:* ${lecturerName}\n` +
                        `*From:* ${student} (${sClass})\n` +
                        `*Reason:* ${reason}\n\n` +
                        `Sent via _Smart Chair Monitoring System_`;

                    const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
                    
                    alert("Appointment saved! Opening WhatsApp...");
                    window.open(whatsappUrl, '_blank');
                } else {
                    alert("Appointment saved! (Lecturer contact not found for WhatsApp)");
                }

                // Reset Form
                document.getElementById('student-name').value = "";
                document.getElementById('student-class').value = "";
                document.getElementById('appointment-reason').value = "";
            })
            .catch((error) => alert("Error: " + error.message));
    }
</script>

</body>
</html>
