<!DOCTYPE html>
<html>
<head>
    <title>JTMK Lecturer Dashboard & Appointment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 30px; }
        h1 { margin: 0; color: #2c3e50; font-size: 2rem; }
        
        /* Statistik */
        .stats-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; min-width: 100px; }
        .stat-number { font-size: 24px; font-weight: bold; display: block; }
        .stat-label { font-size: 12px; color: #7f8c8d; text-transform: uppercase; }

        /* Carian */
        .search-container { max-width: 500px; margin: 0 auto 30px; text-align: center; }
        #search-input { width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.1); outline: none; font-size: 16px; }

        /* Grid Kad */
        #lecturer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1100px; margin: 0 auto 40px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); text-align: center; }
        .lecturer-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        .status-box { padding: 12px; border-radius: 10px; font-weight: bold; color: white; text-transform: uppercase; }

        /* Borang Temujanji */
        .appointment-container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .appointment-container h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background-color: #2980b9; }

        /* Warna Status */
        .bg-none { background-color: #95a5a6; }
        .bg-hadir { background-color: #2ecc71; }
        .bg-busy { background-color: #e67e22; }
        .bg-meeting { background-color: #3498db; }
        .bg-class { background-color: #9b59b6; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SMART CHAIR SYSTEM</h1>
        <p>Jabatan Teknologi Maklumat & Komunikasi</p>
    </div>

    <div class="stats-container">
        <div class="stat-card"><span id="count-hadir" class="stat-number">0</span><span class="stat-label">Hadir</span></div>
        <div class="stat-card"><span id="count-busy" class="stat-number">0</span><span class="stat-label">Busy</span></div>
        <div class="stat-card"><span id="count-total" class="stat-number">0</span><span class="stat-label">Jumlah</span></div>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Cari nama pensyarah..." onkeyup="searchLecturer()">
    </div>
    
    <div id="lecturer-grid"></div>

    <div class="appointment-container">
        <h2>Tempah Temujanji</h2>
        <div class="form-group">
            <label>Pilih Pensyarah:</label>
            <select id="select-lecturer">
                <option value="">-- Sila Pilih --</option>
            </select>
        </div>
        <div class="form-group">
            <label>Nama Pelajar:</label>
            <input type="text" id="student-name" placeholder="Nama penuh anda">
        </div>
        <div class="form-group">
            <label>Tujuan Ingin Berjumpa:</label>
            <textarea id="appointment-reason" rows="3" placeholder="Contoh: Bincang FYP / Hantar tugasan"></textarea>
        </div>
        <button class="btn-submit" onclick="submitAppointment()">Hantar Permohonan</button>
    </div>

    <p style="text-align: center; font-size: 12px; color: #999; margin-top: 30px;">Live Update from JTMK Office</p>

<script>
    const firebaseConfig = {
        databaseURL: "https://smart-chair-system-4c663-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Fungsi Paparan Utama & Statistik
    database.ref('PensyarahJTMK').on('value', (snapshot) => {
        const grid = document.getElementById('lecturer-grid');
        const select = document.getElementById('select-lecturer');
        grid.innerHTML = ""; 
        select.innerHTML = '<option value="">-- Sila Pilih --</option>';

        let counter = { hadir: 0, busy: 0, total: 0 };

        snapshot.forEach((childSnapshot) => {
            const idKey = childSnapshot.key;
            const status = childSnapshot.val();
            const nama = idKey.replace(/_/g, ' ');

            let colorClass = "bg-none";
            if(status === "Hadir") { colorClass = "bg-hadir"; counter.hadir++; }
            else if(status === "Busy") { colorClass = "bg-busy"; counter.busy++; }
            else if(status === "Meeting") colorClass = "bg-meeting";
            else if(status === "In Class") colorClass = "bg-class";

            counter.total++;

            // Update Grid Card
            grid.innerHTML += `
                <div class="card lecturer-card">
                    <div class="lecturer-name">${nama}</div>
                    <div class="status-box ${colorClass}">${status ? status : "TIADA"}</div>
                </div>
            `;

            // Update Dropdown Temujanji
            select.innerHTML += `<option value="${idKey}">${nama}</option>`;
        });

        document.getElementById('count-hadir').innerText = counter.hadir;
        document.getElementById('count-busy').innerText = counter.busy;
        document.getElementById('count-total').innerText = counter.total;
    });

    // Fungsi Carian
    function searchLecturer() {
        let input = document.getElementById('search-input').value.toLowerCase();
        let cards = document.getElementsByClassName('lecturer-card');
        
        for (let i = 0; i < cards.length; i++) {
            let name = cards[i].getElementsByClassName('lecturer-name')[0].innerText.toLowerCase();
            cards[i].style.display = name.includes(input) ? "" : "none";
        }
    }

    // Fungsi Hantar Temujanji ke Firebase
    function submitAppointment() {
        const lect = document.getElementById('select-lecturer').value;
        const student = document.getElementById('student-name').value;
        const reason = document.getElementById('appointment-reason').value;

        if (!lect || !student || !reason) {
            alert("Sila lengkapkan semua maklumat.");
            return;
        }

        const appointmentData = {
            lecturer: lect,
            studentName: student,
            purpose: reason,
            timestamp: new Date().toLocaleString()
        };

        database.ref('Temujanji').push(appointmentData)
            .then(() => {
                alert("Permohonan temujanji berjaya dihantar!");
                document.getElementById('student-name').value = "";
                document.getElementById('appointment-reason').value = "";
            })
            .catch((error) => alert("Gagal: " + error.message));
    }
</script>

</body>
</html>
